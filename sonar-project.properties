# SonarQube Project Configuration

# Project identification
sonar.projectKey=nextjs-app
sonar.projectName=Next.js Application
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=app,components,lib,-hooks,types
sonar.tests=app,components,lib,hooks,types

# Test patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.test.exclusions=**/node_modules/**,**/.next/**,**/coverage/**

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/*.config.js,**/*.config.ts

# Coverage configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.tsx,**/*.config.js,**/*.config.ts

# Encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.node.jest.coveragePath=coverage/lcov.info

# Analysis parameters
sonar.scm.provider=git
