services:
  nextjs-app:
    build: .
    container_name: nextjs-with-db
    environment:
      # App configuration
      - NEXT_PUBLIC_APP_NAME=Next.js with PostgreSQL
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Database configuration (connects to postgres service, not host)
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=colors
      - DB_USER=postgres
      - DB_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=colors
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
