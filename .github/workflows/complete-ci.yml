name: Complete CI Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # Job 1: Code Quality & Linting
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Echo installed packages
        run: echo "Dependencies installed successfully"
        
      - name: Run ESLint
        run: npm run lint || echo "Linting skipped"
        continue-on-error: true
        
      - name: TypeScript Check
        run: npx tsc --noEmit || echo "TypeScript check skipped"
        continue-on-error: true
        
      - name: Type Check
        run: npm run type-check || echo "Type check skipped"
        continue-on-error: true

  # Job 2: Unit Tests with Coverage
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false --passWithNoTests
        
      - name: Test Report
        run: echo "Tests completed with coverage report"
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
          
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-json-summary-action@v2
        with:
          file: ./coverage/coverage-summary.json

  # Job 3: Build Application
  build:
    name: Build Next.js Application
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "Build successful - .next directory exists"
            ls -la .next/
          else
            echo "Build failed - .next directory missing"
            exit 1
          fi
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            public/
          retention-days: 7
          
      - name: Check bundle size
        run: |
          if [ -d ".next" ]; then
            BUILD_SIZE=$(du -sh .next | cut -f1)
            echo "Build size: $BUILD_SIZE"
            echo "::notice title=Build Size::$BUILD_SIZE"
          fi

  # Job 4: Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run npm audit
        run: npm audit --production || echo "npm audit completed with vulnerabilities"
        continue-on-error: true
        
      - name: Check for vulnerabilities
        run: |
          npm audit --production > npm-audit.txt || true
          if grep -q "vulnerabilities" npm-audit.txt; then
            echo "::warning::Vulnerabilities detected in npm audit"
            cat npm-audit.txt
          else
            echo "No vulnerabilities found"
          fi
        continue-on-error: true
          
      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: npm-audit.txt
          retention-days: 7

  # Job 5: Docker Build
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ build, security ]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.ref == 'refs/heads/master'
          
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_IMAGE_NAME || 'nextjs-app' }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}
          
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true
        
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Job 6: Deploy Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ docker-build ]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          # Add your deployment commands here
          # Example: Using Docker Compose
          # docker-compose -f docker-compose.staging.yml pull
          # docker-compose -f docker-compose.staging.yml up -d
          # Example: Using SSH
          # ssh user@staging-server 'docker-compose -f /app/docker-compose.staging.yml pull && docker-compose -f /app/docker-compose.staging.yml up -d'
          
      - name: Notify deployment
        if: success()
        run: echo "Staging deployment successful!"

  # Job 7: Deploy Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ docker-build ]
    if: github.ref == 'refs/heads/master'
    environment:
      name: production
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          # Add your production deployment commands here
          # Example: Using Docker Compose
          # docker-compose -f docker-compose.prod.yml pull
          # docker-compose -f docker-compose.prod.yml up -d
          # Example: Using SSH
          # ssh user@prod-server 'docker-compose -f /app/docker-compose.prod.yml pull && docker-compose -f /app/docker-compose.prod.yml up -d'
          # Example: Using Kubernetes
          # kubectl apply -f k8s/production/
          # kubectl rollout restart deployment/nextjs-app
          
      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Release v${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Notify deployment
        if: success()
        run: |
          echo "Production deployment successful!"
          # Add notification commands
          # Example: Slack webhook
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{
          #   "text": "Production deployment successful - v${{ github.run_number }}",
          #   "blocks": [...]
          # }'
          # Example: Email
          # mail -s "Deployment v${{ github.run_number }} successful" ${{ env.NOTIFICATION_EMAIL }}

